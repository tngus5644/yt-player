name: ytplayer
description: "YTPlayer - 유튜브를 보면서 포인트도 쌓는 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.3.4
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # Charts
  fl_chart: ^0.69.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_analytics: ^11.4.4
  firebase_crashlytics: ^4.3.4

  # Utils
  device_info_plus: ^11.3.0
  package_info_plus: ^8.1.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
